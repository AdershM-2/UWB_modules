sentence=Scalable N-anchor UWB indoor positioning for the Makerfabs ESP32 UWB Pro (DW1000).
paragraph=Clean DS-TWR ranging + round-robin TDMA scheduling on top of the proven low-level DW1000 register driver, removing the upstream library's ~4-anchor and single-tag limits. The tag streams raw ranges (UDP or USB serial) to a MATLAB host that does multilateration and EKF filtering. IMU (BNO085) and multi-tag hooks are designed in.
